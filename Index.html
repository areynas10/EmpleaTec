<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmpleaTec Skill Challenge</title>
    <style>
        :root { --tec-blue: #003087; --tecm-green: #00b388; --dark: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; text-align: center; }
        .header { padding: 20px; background: #1e293b; border-bottom: 3px solid var(--tec-blue); }
        .container { width: 90%; max-width: 500px; margin: auto; padding: 20px; }
        .card { background: #1e293b; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-top: 20px; }
        button { background: var(--tec-blue); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; width: 100%; margin: 10px 0; font-size: 1.1em; }
        .btn-green { background: var(--tecm-green); }
        
        /* Gráficos de Juegos */
        .game-box { height: 250px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #0f172a; border-radius: 15px; margin-bottom: 15px; }
        .node { width: 60px; height: 60px; border-radius: 50%; position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; transition: 0.2s; }
        .task-bar { width: 100%; background: #334155; height: 10px; border-radius: 5px; margin: 10px 0; }
        .task-progress { background: var(--tecm-green); height: 100%; width: 0%; border-radius: 5px; transition: 0.3s; }
        
        /* Logos */
        .footer-logos { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 30px; padding: 20px; }
        .logo-img { height: 40px; filter: brightness(1.2); }
        .skill-badge { color: var(--tecm-green); font-weight: bold; border: 1px solid var(--tecm-green); padding: 5px 10px; border-radius: 5px; font-size: 0.8em; margin: 5px; display: inline-block; }
    </style>
</head>
<body>

<div class="header">
    <h1 style="margin:0;">EmpleaTec 2026</h1>
    <p style="margin:5px 0; opacity:0.8;">Mide tus habilidades competitivas</p>
</div>

<div class="container" id="main-menu">
    <div class="card">
        <h3>Selecciona un reto:</h3>
        <button onclick="startDigital()">🌐 Nexo Digital</button>
        <p style="font-size:0.7em; opacity:0.6;">Agilidad, Destreza, Adaptación</p>
        
        <button onclick="startResults()" class="btn-green">📈 Misión Resultados</button>
        <p style="font-size:0.7em; opacity:0.6;">Autogestión, Organización, Resolución</p>
        
        <button onclick="startService()">🤝 Radar de Servicio</button>
        <p style="font-size:0.7em; opacity:0.6;">Resiliencia, Orientación al Servicio</p>
    </div>
</div>

<div class="container" id="game-area" style="display:none;">
    <h2 id="game-title"></h2>
    <div id="game-content" class="card"></div>
    <button onclick="location.reload()" style="background:#475569;">Reiniciar</button>
</div>

<div class="footer-logos">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/47/Logo_del_Tec_de_Monterrey.svg" class="logo-img" alt="Tec">
    <span style="font-weight:bold; color:white; font-size:1.2em;">EmpleaTec</span>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Logo_Tecmilenio.png/640px-Logo_Tecmilenio.png" class="logo-img" alt="Tecmilenio">
</div>

<script>
    const area = document.getElementById('game-area');
    const menu = document.getElementById('main-menu');
    const content = document.getElementById('game-content');
    const title = document.getElementById('game-title');

    function initGame(name) {
        menu.style.display = 'none';
        area.style.display = 'block';
        title.innerText = name;
    }

    // --- JUEGO 1: NEXO DIGITAL ---
    function startDigital() {
        initGame("Nexo Digital");
        let score = 0; let timeLeft = 40;
        let isUpdated = false;

        const spawn = () => {
            if(timeLeft <= 0) return;
            const colors = isUpdated ? ['#f43f5e', '#10b981'] : ['#3b82f6', '#f59e0b'];
            const x = Math.random() * 80;
            const y = Math.random() * 80;
            content.innerHTML = `
                <p>Toca los nodos rápidamente. ¡Cuidado con el cambio de interfaz!</p>
                <div class="game-box" id="box">
                    <div class="node" style="left:${x}%; top:${y}%; background:${colors[0]};" onclick="window.hitDigital()">📱</div>
                </div>
                <p>Conexiones: ${score} | Tiempo: ${timeLeft}s</p>
            `;
        };

        window.hitDigital = () => { score++; spawn(); };
        
        let timer = setInterval(() => {
            timeLeft--;
            if(timeLeft === 20) { isUpdated = true; } // Cambio de interfaz
            if(timeLeft <= 0) {
                clearInterval(timer);
                finish("Conector Pro", "Agilidad de aprendizaje, Destreza digital, Inteligencia social, Adaptación al cambio", score);
            } else spawn();
        }, 1000);
        spawn();
    }

    // --- JUEGO 2: MISIÓN RESULTADOS ---
    function startResults() {
        initGame("Misión Resultados");
        let solved = 0; let energy = 100; let timeLeft = 40;

        const update = () => {
            content.innerHTML = `
                <p>Resuelve proyectos. No agotes tu energía dando clicks sin sentido.</p>
                <div class="task-bar"><div class="task-progress" style="width:${energy}%"></div></div>
                <div class="game-box">
                    <div class="node" style="background:var(--tecm-green); position:static;" onclick="window.doJob()">⚙️</div>
                </div>
                <p>Proyectos: ${solved} | Energía: ${energy}%</p>
            `;
        };

        window.doJob = () => {
            if(energy > 10) {
                solved++; energy -= 15;
                setTimeout(() => { if(energy < 100) energy += 5; update(); }, 500);
            } else { alert("¡Sin energía! Organiza tus esfuerzos."); }
            update();
        };

        let timer = setInterval(() => {
            timeLeft--;
            if(timeLeft <= 0) {
                clearInterval(timer);
                finish("Arquitecto de Soluciones", "Autogestión, Orientación a resultados, Organización, Resolución de problemas", solved);
            } else update();
        }, 1000);
        update();
    }

    // --- JUEGO 3: RADAR DE SERVICIO ---
    function startService() {
        initGame("Radar de Servicio");
        let score = 0; let timeLeft = 40;

        const update = () => {
            const types = [{e:'😊', v:10, t:'Servicio'}, {e:'😡', v:20, t:'Resiliencia'}];
            const sel = types[Math.floor(Math.random()*2)];
            content.innerHTML = `
                <p>Atiende a los usuarios según su estado de ánimo.</p>
                <div class="game-box">
                    <div class="node" style="background:white; color:black; font-size:40px; position:static;" onclick="window.hitService(${sel.v})">${sel.e}</div>
                </div>
                <p>Puntos de Servicio: ${score} | Tiempo: ${timeLeft}s</p>
            `;
        };

        window.hitService = (v) => { score += v; update(); };

        let timer = setInterval(() => {
            timeLeft--;
            if(timeLeft <= 0) {
                clearInterval(timer);
                finish("Embajador de Experiencias", "Orientación al servicio, Resiliencia, Adaptación al cambio", score);
            } else update();
        }, 1000);
        update();
    }

    function finish(perfil, skills, score) {
        let skillsArr = skills.split(', ');
        content.innerHTML = `
            <h2 style="color:var(--tecm-green)">¡Reto Superado!</h2>
            <h3 style="margin-bottom:0;">${perfil}</h3>
            <p style="margin-top:5px; opacity:0.8;">Puntaje: ${score}</p>
            <div style="margin:15px 0;">
                ${skillsArr.map(s => `<span class="skill-badge">${s}</span>`).join('')}
            </div>
            <p style="font-size:0.8em; border-top:1px solid #334155; padding-top:10px;">Tu perfil destaca por estas competencias oficiales de <strong>Tec / Tecmilenio</strong>.</p>
        `;
    }
</script>
</body>
</html>
