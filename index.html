<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmpleaTec Skill Challenge</title>
    <style>
        :root { --tec-blue: #003087; --tecm-green: #00b388; --dark: #0a0f1e; --card: #161e31; }
        body { font-family: 'Montserrat', 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow-x: hidden; }
        
        /* Header con Logos */
        .header-brand { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #ffffff; border-bottom: 4px solid var(--tec-blue); }
        .logo-img { height: 35px; }
        .header-brand h1 { color: var(--tec-blue); font-size: 1.2rem; margin: 0; font-weight: 900; }

        .container { width: 90%; max-width: 500px; margin: 20px auto; text-align: center; }
        .card { background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #2d3748; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        button { background: var(--tec-blue); color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        .btn-green { background: var(--tecm-green); }

        .game-box { height: 300px; background: #00000033; border-radius: 15px; position: relative; border: 2px dashed #334155; margin: 15px 0; overflow: hidden; }
        .timer-bar { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; margin-bottom: 10px; }
        .timer-fill { height: 100%; background: #f43f5e; width: 100%; transition: 1s linear; }
        
        .node { width: 55px; height: 55px; border-radius: 50%; position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; animation: pop 0.3s ease-out; }
        @keyframes pop { from {transform: scale(0);} to {transform: scale(1);} }
        
        .skill-badge { background: rgba(0, 179, 136, 0.1); color: var(--tecm-green); border: 1px solid var(--tecm-green); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; display: inline-block; margin: 3px; }
        .instr { font-size: 0.9rem; opacity: 0.8; margin-bottom: 20px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="header-brand">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/47/Logo_del_Tec_de_Monterrey.svg" class="logo-img">
    <h1>EmpleaTec</h1>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/4/4d/Logo_Tecmilenio.png/640px-Logo_Tecmilenio.png" class="logo-img">
</div>

<div class="container" id="view-manager">
    <div id="menu">
        <div class="card">
            <h2 style="margin-top:0">Bienvenido al Challenge</h2>
            <p class="instr">Completa los 3 desafíos de 25 segundos para descubrir tu perfil de competencias oficiales.</p>
            <button onclick="showStart('digital')">1. NEXO DIGITAL</button>
            <button onclick="showStart('results')" class="btn-green" style="margin-top:10px;">2. MISIÓN RESULTADOS</button>
            <button onclick="showStart('service')" style="margin-top:10px;">3. RADAR DE SERVICIO</button>
        </div>
    </div>

    <div id="start-screen" style="display:none">
        <div class="card">
            <h2 id="st-title"></h2>
            <p id="st-desc" class="instr"></p>
            <button id="st-btn" class="btn-green">¡COMENZAR RETO!</button>
        </div>
    </div>

    <div id="game-view" style="display:none">
        <div class="timer-bar"><div id="t-fill" class="timer-fill"></div></div>
        <div id="game-ui"></div>
        <div class="game-box" id="stage"></div>
    </div>

    <div id="result-view" style="display:none">
        <div class="card" id="result-card"></div>
        <button onclick="location.reload()" style="margin-top:15px; background:#475569;">VOLVER AL INICIO</button>
    </div>
</div>

<script>
    let currentScore = 0;
    let timeLeft = 25;
    let timerInterval;
    const stage = document.getElementById('stage');

    const games = {
        digital: {
            title: "Nexo Digital",
            desc: "Toca los círculos lo más rápido posible. Los azules valen 1 pto, los dorados valen 5 ptos. Evalúa Agilidad de Aprendizaje y Destreza Digital.",
            play: () => spawnDigital()
        },
        results: {
            title: "Misión Resultados",
            desc: "Solo toca los engranajes VERDES. Evita los ROJOS que te restan puntos. Evalúa Orientación a Resultados y Autogestión.",
            play: () => spawnResults()
        },
        service: {
            title: "Radar de Servicio",
            desc: "Aparecerán emojis. Resuelve los 'molestos' (😡) tocándolos dos veces. Evalúa Inteligencia Social y Resiliencia.",
            play: () => spawnService()
        }
    };

    function showStart(key) {
        document.getElementById('menu').style.display = 'none';
        const scr = document.getElementById('start-screen');
        scr.style.display = 'block';
        document.getElementById('st-title').innerText = games[key].title;
        document.getElementById('st-desc').innerText = games[key].desc;
        document.getElementById('st-btn').onclick = () => startGame(key);
    }

    function startGame(key) {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('game-view').style.display = 'block';
        currentScore = 0;
        timeLeft = 25;
        document.getElementById('t-fill').style.width = '100%';
        
        timerInterval = setInterval(() => {
            timeLeft--;
            document.getElementById('t-fill').style.width = (timeLeft/25)*100 + '%';
            if(timeLeft <= 0) endGame(key);
        }, 1000);

        games[key].play();
    }

    // --- LÓGICA JUEGO 1: NEXO ---
    function spawnDigital() {
        stage.innerHTML = '';
        if(timeLeft <= 0) return;
        const isBonus = Math.random() > 0.8;
        const node = document.createElement('div');
        node.className = 'node';
        node.style.left = Math.random()*80 + '%';
        node.style.top = Math.random()*80 + '%';
        node.style.background = isBonus ? '#f1c40f' : '#3b82f6';
        node.innerText = isBonus ? '⭐' : '📱';
        node.onclick = () => { currentScore += isBonus ? 5 : 1; spawnDigital(); };
        stage.appendChild(node);
    }

    // --- LÓGICA JUEGO 2: RESULTADOS ---
    function spawnResults() {
        stage.innerHTML = '';
        if(timeLeft <= 0) return;
        for(let i=0; i<2; i++) {
            const isBad = Math.random() > 0.6;
            const node = document.createElement('div');
            node.className = 'node';
            node.style.left = Math.random()*80 + '%';
            node.style.top = Math.random()*80 + '%';
            node.style.background = isBad ? '#ef4444' : '#10b981';
            node.innerText = isBad ? '⚠️' : '⚙️';
            node.onclick = () => { 
                currentScore += isBad ? -3 : 2; 
                spawnResults(); 
            };
            stage.appendChild(node);
        }
    }

    // --- LÓGICA JUEGO 3: SERVICE ---
    function spawnService() {
        stage.innerHTML = '';
        if(timeLeft <= 0) return;
        const isAngry = Math.random() > 0.5;
        const node = document.createElement('div');
        node.className = 'node';
        let clicks = isAngry ? 2 : 1;
        node.style.left = Math.random()*80 + '%';
        node.style.top = Math.random()*80 + '%';
        node.style.background = isAngry ? '#991b1b' : '#1e3a8a';
        node.innerText = isAngry ? '😡' : '😊';
        node.onclick = () => {
            clicks--;
            if(clicks <= 0) { currentScore += isAngry ? 10 : 3; spawnService(); }
            else { node.innerText = '⏳'; node.style.background = '#f97316'; }
        };
        stage.appendChild(node);
    }

    function endGame(key) {
        clearInterval(timerInterval);
        document.getElementById('game-view').style.display = 'none';
        const resView = document.getElementById('result-view');
        const resCard = document.getElementById('result-card');
        resView.style.display = 'block';

        let perfil = "";
        let skills = [];

        // SISTEMA DE EVALUACIÓN REAL POR JUEGO
        if(key === 'digital') {
            if(currentScore > 20) {
                perfil = "Conector de Vanguardia";
                skills = ["Destreza Digital", "Agilidad de Aprendizaje", "Adaptación al cambio"];
            } else if (currentScore > 5) {
                perfil = "Explorador Tecnológico";
                skills = ["Destreza Digital"];
            } else {
                perfil = "Perfil en Crecimiento";
                skills = ["Potencial de Aprendizaje"];
            }
        } else if(key === 'results') {
            if(currentScore > 15) {
                perfil = "Arquitecto de Resultados";
                skills = ["Orientación a Resultados", "Autogestión", "Resolución de Problemas"];
            } else if (currentScore > 5) {
                perfil = "Ejecutor Enfocado";
                skills = ["Organización"];
            } else {
                perfil = "Perfil en Desarrollo";
                skills = ["Potencial de Autogestión"];
            }
        } else if(key === 'service') {
            if(currentScore > 30) {
                perfil = "Embajador de Inteligencia Social";
                skills = ["Inteligencia Social", "Orientación al Servicio", "Resiliencia"];
            } else if (currentScore > 10) {
                perfil = "Gestor de Experiencias";
                skills = ["Orientación al Servicio"];
            } else {
                perfil = "Empatía en Formación";
                skills = ["Potencial de Resiliencia"];
            }
        }

        resCard.innerHTML = `
            <h1 style="color:var(--tecm-green); margin:0;">${perfil}</h1>
            <p>Tu desempeño generó un impacto de: <strong>${currentScore} pts</strong></p>
            <div style="margin:20px 0;">
                <p style="font-size:0.8rem; opacity:0.7">Habilidades Identificadas:</p>
                ${skills.map(s => `<span class="skill-badge">${s}</span>`).join('')}
            </div>
            <p style="font-size:0.8rem; line-height:1.4">Este perfil ha sido validado bajo el marco de competencias de EmpleaTec 2026.</p>
        `;
    }
</script>
</body>
</html>
