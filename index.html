<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmpleaTec Skill Challenge</title>
    <style>
        :root { --tec-blue: #003087; --tecm-green: #00b388; --dark: #0a0f1e; --card: #161e31; }
        body { font-family: 'Montserrat', 'Segoe UI', sans-serif; background: var(--dark); color: white; margin: 0; overflow-x: hidden; text-align: center; }
        
        /* Header con Logos Incrustados (Base64) */
        .header-brand { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #ffffff; border-bottom: 4px solid var(--tec-blue); }
        .logo-img { height: 30px; width: auto; object-fit: contain; }
        .header-brand h1 { color: var(--tec-blue); font-size: 1.1rem; margin: 0; font-weight: 900; }

        .container { width: 92%; max-width: 480px; margin: 15px auto; }
        .card { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #2d3748; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        
        button { background: var(--tec-blue); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.97); opacity: 0.9; }
        .btn-green { background: var(--tecm-green); }
        .btn-gray { background: #475569; }

        .game-box { height: 320px; background: #00000022; border-radius: 15px; position: relative; border: 2px dashed #2d3748; margin: 15px 0; overflow: hidden; }
        
        /* Barra de Tiempo */
        .timer-container { width: 100%; height: 6px; background: #1e293b; border-radius: 3px; margin-bottom: 8px; overflow: hidden; }
        .timer-fill { height: 100%; background: #f43f5e; width: 100%; transition: width 0.1s linear; }
        
        /* Iconos Nexo Digital y Resultados */
        .node { width: 60px; height: 60px; border-radius: 50%; position: absolute; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 26px; animation: popIn 0.2s ease-out; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        @keyframes popIn { from {transform: scale(0.5); opacity:0;} to {transform: scale(1); opacity:1;} }
        
        /* Nuevo Radar de Servicio (Mecánica Globos) */
        .angry-face { font-size: 80px; cursor: pointer; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); transition: background 0.2s, color 0.2s; border-radius: 50%; padding: 20px; }
        .angry-active { background: #991b1b; color: white; }
        .angry-happy { background: #15803d; color: white; }
        .angry-pop { background: #dc2626; color: white; animation: shake 0.3s; }
        @keyframes shake { 0% { transform: translate(-50%, -50%) rotate(0deg); } 20% { transform: translate(-50%, -50%) rotate(5deg); } 40% { transform: translate(-50%, -50%) rotate(-5deg); } 60% { transform: translate(-50%, -50%) rotate(5deg); } 100% { transform: translate(-50%, -50%) rotate(0deg); } }

        .skill-badge { background: rgba(0, 179, 136, 0.1); color: var(--tecm-green); border: 1px solid var(--tecm-green); padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; display: inline-block; margin: 3px; }
        .instr { font-size: 0.9rem; opacity: 0.8; margin-bottom: 20px; line-height: 1.4; }
    </style>
</head>
